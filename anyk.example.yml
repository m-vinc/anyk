asn: 65534

services:
  - name: a_simple_nginx_instance
    active: true
    anycast_ips: [10.0.0.1/32]
    endpoints:
      - ip: 10.0.0.5
        http_check:
          verb: GET
          expected_code: 200

  - name: dc
    active: true
    anycast_ips: [fd00:0dc9:e421::1/128, 10.0.1.1/32]
    callbacks:
      - healthy: true
        command: ["echo", "service healthy"]
      - healthy: false
        command: ["echo", "service unhealthy"]
    endpoints:
      - ip: 10.0.1.5
        dns_check:
          type: TXT
          query: _kerberos.my.lan.
          expected: "MY.LAN"

      - ip: fd00:0dc9:e421::5
        dns_check:
          type: TXT
          query: _kerberos.my.lan.
          expected: "MY.LAN"

